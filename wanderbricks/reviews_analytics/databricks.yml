# Reviews & quality data product (Trust & Quality).
bundle:
  name: reviews_analytics

include:
  - resources/*.yml

variables:
  warehouse_id:
    description: SQL warehouse for the alert.
  catalog:
    description: Catalog for outputs.
  schema:
    description: Schema for outputs.
targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: catalog
      schema: ${workspace.current_user.short_name}
  staging:
    mode: production
    workspace:
      root_path: /Workspace/Shared/wanderbricks/${bundle.name}/${bundle.target}
    permissions:
      - group_name: users
        level: CAN_MANAGE
    variables:
      catalog: catalog
      schema: staging
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/wanderbricks/${bundle.name}/${bundle.target}
    permissions:
      - group_name: users
        level: CAN_MANAGE
    variables:
      catalog: catalog
      schema: prod
