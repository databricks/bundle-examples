bundle:
  name: dashboard_nyc_taxi

  # The Genie space in this bundle can only be deployed with the direct deployment
  # engine. The direct engine is the default for new deployments since Databricks
  # CLI v1.3.0.
  engine: direct

include:
  - resources/*.yml

variables:
  # The "warehouse_id" variable is used to reference the warehouse used by the dashboard.
  warehouse_id:
    lookup:
      # Replace this with the name of your SQL warehouse.
      warehouse: "Shared Unity Catalog Severless"

workspace:
  host: https://myworkspace.databricks.com

targets:
  dev:
    default: true
    mode: development
