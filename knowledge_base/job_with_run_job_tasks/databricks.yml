bundle:
  name: wanderbricks_ingestion

workspace:

permissions:
  - level: CAN_VIEW
    group_name: users

resources:
  jobs:
    bookings_orchestration:
      name: Wanderbricks bookings orchestration

      tasks:
        - task_key: run_ingest_reviews
          run_job_task:
            job_id: ${resources.jobs.ingest_reviews.id}

        - task_key: run_ingest_clickstream
          depends_on:
            - task_key: run_ingest_reviews

          run_job_task:
            job_id: ${resources.jobs.ingest_clickstream.id}

      parameters:
        - name: input
          default: test_propagation


    ingest_reviews:
      name: Ingest reviews

      tasks:
        - task_key: leaf
          environment_key: default
          spark_python_task:
            python_file: ./argv.py
            parameters:
              - "leaf1"
              - "{{ job.parameters.[input] }}"
      parameters:
        - # This parameter is passed by the primary job.
          name: input
          default: ""

      environments:
        - environment_key: default
          spec:
            client: "1"


    ingest_clickstream:
      name: Ingest clickstream

      tasks:
        - task_key: leaf
          environment_key: default
          spark_python_task:
            python_file: ./argv.py
            parameters:
              - "leaf2"
              - "{{ job.parameters.[input] }}"

      parameters:
        - # This parameter is passed by the primary job.
          name: input
          default: ""

      environments:
        - environment_key: default
          spec:
            client: "1"


targets:
  dev:
    default: true
    mode: development
