# The main pipeline for mar11

resources:
  pipelines:
    mar11_etl:
      name: mar11_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/mar11_etl"

      libraries:
        - glob:
            include: ../src/mar11_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
      configuration:
        kkk: vvv
