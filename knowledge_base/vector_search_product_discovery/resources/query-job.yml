resources:
  jobs:
    product_discovery_query:
      name: product_discovery_query

      parameters:
        - name: index_name
          default: ${resources.vector_search_indexes.product_index.name}
        - name: endpoint_name
          default: ${resources.vector_search_endpoints.product_search_endpoint.name}
        - name: embedding_model
          default: ${var.embedding_model}
        - name: embedding_dimension
          default: ${var.embedding_dimension}
        - name: query
          default: warm insulated jacket for cold mountain weather
        - name: num_results
          default: "5"

      environments:
        - environment_key: serverless_env
          spec:
            client: "3"
            dependencies:
              - databricks-vectorsearch

      tasks:
        - task_key: query
          environment_key: serverless_env
          notebook_task:
            notebook_path: ../src/02_query_demo.py
