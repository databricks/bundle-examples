# A sample job for lakeflow_pipelines_sql.

resources:
  jobs:
    refresh_bookings:
      name: Wanderbricks refresh bookings

      trigger:
        # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
        periodic:
          interval: 1
          unit: DAYS

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.ingest_bookings.id}

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
