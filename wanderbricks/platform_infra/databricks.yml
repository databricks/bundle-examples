# Shared platform infrastructure (Platform team).
bundle:
  name: platform_infra

include:
  - resources/*.yml
targets:
  dev:
    mode: development
    default: true
  staging:
    mode: production
    workspace:
      root_path: /Workspace/Shared/wanderbricks/${bundle.name}/${bundle.target}
    permissions:
      - group_name: users
        level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/wanderbricks/${bundle.name}/${bundle.target}
    permissions:
      - group_name: users
        level: CAN_MANAGE
    resources:
      jobs:
        freshness_check:
          name: Source freshness SLA
          tags: {domain: platform, team: platform}
          trigger:
            periodic: {interval: 12, unit: HOURS}
          tasks:
            - task_key: freshness
              environment_key: default
              spark_python_task:
                python_file: src/freshness_check.py
          environments:
            - {environment_key: default, spec: {client: "1"}}
