# A job running SQL queries on a SQL warehouse
resources:
  jobs:
    bookings_pipeline:
      name: Wanderbricks bookings

      trigger:
        # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
        periodic:
          interval: 1
          unit: DAYS

      email_notifications:
        on_failure:
          - user@company.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: bundle_target
          default: ${bundle.target}

      tasks:
        - task_key: bookings_raw
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/bookings_raw.sql

        - task_key: bookings_daily
          depends_on:
            - task_key: bookings_raw
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/bookings_daily.sql
