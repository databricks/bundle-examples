bundle:
  name: wanderbricks_reviews_job

include:
  - resources/*.yml

workspace:

targets:
  dev:
    default: true
    mode: development

  staging:
    mode: production
    workspace:
      root_path: /Workspace/Shared/wanderbricks/${bundle.name}/${bundle.target}
    permissions:
      - group_name: users
        level: CAN_MANAGE
