resources:
  jobs:
    host_kpis:
      name: Host KPIs
      description: Daily host KPI rollups for the Supply team.
      tags: {domain: host_analytics, team: supply}
      trigger:
        periodic: {interval: 1, unit: DAYS}
      email_notifications:
        on_failure: ["supply@wanderbricks.example"]
      parameters:
        - {name: catalog, default: "${var.catalog}"}
        - {name: schema, default: "${var.schema}"}
      tasks:
        - task_key: host_kpis
          sql_task: {warehouse_id: "d2c8a1f09b3e4567", file: {path: ../src/host_kpis.sql}}
        - task_key: property_revenue
          depends_on: [{task_key: host_kpis}]
          sql_task: {warehouse_id: "d2c8a1f09b3e4567", file: {path: ../src/property_revenue.sql}}
