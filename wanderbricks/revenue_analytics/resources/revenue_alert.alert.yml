resources:
  alerts:
    revenue_drop:
      display_name: "Revenue drop alert"
      warehouse_id: ${var.warehouse_id}
      query_text: |
        SELECT to_date(check_in) AS booking_date, sum(total_amount) AS revenue
        FROM samples.wanderbricks.bookings
        GROUP BY ALL ORDER BY 1 DESC
      evaluation:
        comparison_operator: "LESS_THAN"
        source: {aggregation: "MIN", display: "revenue", name: "revenue"}
        threshold: {value: {double_value: 50000.0}}
        notification: {notify_on_ok: true, retrigger_seconds: 3600}
      schedule:
        pause_status: "UNPAUSED"
        quartz_cron_schedule: "0 0 8 * * ?"
        timezone_id: "UTC"
