# This is a bundle definition for a job with task values.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: job_with_task_values

python:
  venv_path: .venv
  # Functions called to load resources defined in Python. See resources/__init__.py
  resources:
    - "resources:load_resources"

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  dev:
    mode: development
    default: true