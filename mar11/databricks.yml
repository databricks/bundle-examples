# This is a Databricks asset bundle definition for mar11.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: mar11
  uuid: 75c44fc3-3b62-458b-bc90-268d7758318b

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://e2-dogfood.staging.cloud.databricks.com
    variables:
      catalog: main
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://e2-dogfood.staging.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ilya.kuznetsov@databricks.com to make sure we only have a single copy.
      root_path: /Workspace/Users/ilya.kuznetsov@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: prod
    permissions:
      - user_name: ilya.kuznetsov@databricks.com
        level: CAN_MANAGE
