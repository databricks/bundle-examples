resources:
  jobs:
    product_discovery_setup:
      name: product_discovery_setup

      parameters:
        - name: index_name
          default: ${resources.vector_search_indexes.product_index.name}
        - name: endpoint_name
          default: ${resources.vector_search_endpoints.product_search_endpoint.name}
        - name: embedding_model
          default: ${var.embedding_model}
        - name: embedding_dimension
          default: ${var.embedding_dimension}
        - name: data_path
          default: ${workspace.file_path}/data/products.json

      environments:
        - environment_key: serverless_env
          spec:
            client: "3"
            dependencies:
              - databricks-vectorsearch

      tasks:
        - task_key: upsert_products
          description: Load products from JSON, embed descriptions, and upsert into the Vector Search index
          environment_key: serverless_env
          notebook_task:
            notebook_path: ../src/01_upsert_products.py

      max_concurrent_runs: 1
