# Demand forecasting ML project (Data Science).
bundle:
  name: demand_forecasting

variables:
  catalog:
    description: Catalog for prediction outputs.
    default: main
  schema:
    description: Schema for prediction outputs.
    default: demand_ml


include:
  - resources/*.yml
targets:
  dev:
    mode: development
    default: true
  staging:
    mode: production
    workspace:
      root_path: /Workspace/Shared/wanderbricks/${bundle.name}/${bundle.target}
    permissions:
      - group_name: users
        level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/wanderbricks/${bundle.name}/${bundle.target}
    permissions:
      - group_name: users
        level: CAN_MANAGE
