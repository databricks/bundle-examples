resources:
  jobs:
    revenue_summary:
      name: Revenue by payment method
      description: Daily revenue aggregated by payment method.
      tags: {domain: revenue, team: analytics-eng, tier: gold}
      trigger:
        periodic: {interval: 7, unit: DAYS}
      email_notifications:
        on_failure: ["data-eng@wanderbricks.example"]
      queue: {enabled: true}
      max_concurrent_runs: 1
      parameters:
        - {name: catalog, default: "${var.catalog}"}
        - {name: schema, default: "${var.schema}"}
      tasks:
        - task_key: revenue_by_method
          sql_task:
            warehouse_id: "4d9d8c7b6a5e4f30"
            file: {path: ../src/revenue_by_method.sql}
